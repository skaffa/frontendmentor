<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Mentor Solutions</title>
    <style>
        /* Minimalist, typographic dark mode */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0d0e;
            color: #949499;
            max-width: 500px;
            margin: 120px auto;
            padding: 0 24px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #ffffff;
            margin: 0;
        }

        .counter {
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.75rem;
            color: #4c4c52;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            border-top: 1px solid #1f1f23;
        }

        li {
            border-bottom: 1px solid #1f1f23;
        }

        /* Clean, line-item interaction instead of bulky cards */
        a {
            display: flex;
            align-items: center;
            color: #bcbcbf;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 20px 0;
            transition: color 0.2s ease, padding-left 0.2s ease;
        }

        /* Monospace numbering gives a deliberate, curated feel */
        a .index {
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.75rem;
            color: #4c4c52;
            margin-right: 24px;
            width: 16px;
            transition: color 0.2s ease;
        }

        /* Subtle human touch: text shifts slightly right on hover */
        a:hover {
            color: #ffffff;
            padding-left: 6px;
        }

        a:hover .index {
            color: #a1a1aa;
        }
    </style>
</head>
<body>

    <header>
        <h1>Frontend Mentor</h1>
        <span class="counter">v1.0</span>
    </header>
    
    <ul>
        <li>
            <a href="./faq-accordion/CSS_SOLUTION" target="_blank">
                <span class="index">01</span>FAQ Accordion
            </a>
        </li>
        <li>
            <a href="./interactive-rating-component" target="_blank">
                <span class="index">02</span>Interactive Rating Component
            </a>
        </li>
        <li>
            <a href="./social-links-profile" target="_blank">
                <span class="index">03</span>Social Links Profile
            </a>
        </li>
    </ul>

</body>
</html>
